name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      # Checkout agentkit-js FIRST into a sibling directory.
      # GitHub Actions doesn't allow checking out outside the workspace,
      # so we use a relative path within the workspace and create a
      # symlink the workspace expects (../agentkit-js).
      - name: Checkout agentkit-js
        uses: actions/checkout@v4
        with:
          repository: telleroutlook/agentkit-js
          path: agentkit-js
          ref: main

      - name: Checkout bscode
        uses: actions/checkout@v4
        with:
          path: bscode

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Make agentkit-js available as a sibling of bscode
        run: |
          # bscode/package.json references "../agentkit-js/packages/*" in workspaces.
          # GitHub puts both checkouts at $GITHUB_WORKSPACE (sibling already).
          ls -la "$GITHUB_WORKSPACE"
          echo "--- agentkit-js packages ---"
          ls -la "$GITHUB_WORKSPACE/agentkit-js/packages" || echo "MISSING"

      - name: Install dependencies (agentkit-js — build deps first)
        working-directory: agentkit-js
        run: bun install --frozen-lockfile

      - name: Build agentkit-js packages (so dist/ exists for typecheck)
        working-directory: agentkit-js
        run: bun run build

      - name: Install dependencies (bscode)
        working-directory: bscode
        run: bun install

      - name: Typecheck (worker)
        working-directory: bscode/apps/worker
        run: bunx tsc --noEmit

      - name: Typecheck (web)
        working-directory: bscode/apps/web
        run: bunx tsc --noEmit

      - name: Test (web)
        working-directory: bscode/apps/web
        run: bun run test

      - name: Test (worker — if vitest config exists)
        working-directory: bscode/apps/worker
        run: |
          if [ -f vitest.config.ts ]; then bun run vitest run; else echo "no vitest config — skipping"; fi

      - name: Build (web)
        working-directory: bscode/apps/web
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # ── Cloudflare deploy (only on push to main; gated on secrets) ────────────
      #
      # Two artefacts get deployed:
      #   1. Worker  (apps/worker)  — the agent runtime backend
      #   2. Web     (apps/web)     — the Next.js UI via @cloudflare/next-on-pages
      #
      # The deploy steps short-circuit cleanly if the repo doesn't have CF
      # secrets configured — same pattern agentkit-js's ci.yml uses. That
      # keeps PRs from forks from breaking the pipeline (forks can't see
      # the secrets) without needing a separate workflow file.
      #
      # Custom domain bindings (bscode.byteslim.com etc.) are configured
      # ONCE in the Cloudflare dashboard — wrangler.toml does not pin them
      # because the domain belongs to the operator, not the repo.

      - name: Deploy worker to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: bscode
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping worker deploy: Cloudflare secrets not configured."
            exit 0
          fi
          bun run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy web to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: bscode
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping web deploy: Cloudflare secrets not configured."
            exit 0
          fi
          bun run deploy:web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # In the deployed UI, the web client must call the deployed worker
          # rather than localhost. Setting this at build time bakes the URL
          # into the static bundle (next.config.ts reads NEXT_PUBLIC_WORKER_URL).
          # Override via repo variable BSCODE_WORKER_URL if you bind the
          # worker to a different domain.
          NEXT_PUBLIC_WORKER_URL: ${{ vars.BSCODE_WORKER_URL || 'https://bscode-worker.byteslim.com' }}
