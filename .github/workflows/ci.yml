name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:
  repository_dispatch:
    types: [wasmagent-js-updated]

jobs:
  ci:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bscode
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # @wasmagent/* 1.0.0 published to npm — no sibling checkout needed.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Branding check
        run: node scripts/check-branding.mjs

      - name: Typecheck (worker)
        working-directory: apps/worker
        run: bunx tsc --noEmit

      - name: Typecheck (web)
        working-directory: apps/web
        run: bunx tsc --noEmit

      - name: Test (worker)
        working-directory: apps/worker
        run: bun run test

      - name: Test (web)
        working-directory: apps/web
        run: bun run test

      - name: Build (web)
        working-directory: apps/web
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # A1 — Cloudflare Worker bundle size budget (6 MB uncompressed).
      # Guards against pyodide / browser tools / model SDKs being statically bundled.
      - name: Worker bundle size budget (A1)
        working-directory: apps/worker
        run: |
          bun run build
          node ../../scripts/check-bundle-size.mjs

      # A2 — Validate fixture rollouts conform to rollout-wire/v1 schema.
      # Ensures the shared fixture byte-matches the contract and that all
      # required fields are present with correct types.
      - name: Rollout fixture schema validation (A2)
        run: node scripts/check-rollout-schema.mjs

      # A3 — Production config lint: warn if BSCODE_ALLOWED_ORIGIN is still
      # the local dev default. Does not block CI (deploy is gated on secrets),
      # but surfaces misconfiguration early.
      - name: Production config lint (A3)
        run: |
          ORIGIN=$(grep -r "BSCODE_ALLOWED_ORIGIN" apps/worker/wrangler.toml | grep -v "^#" | grep "localhost" || true)
          if [ -n "$ORIGIN" ]; then
            echo "::warning::BSCODE_ALLOWED_ORIGIN is still set to localhost in wrangler.toml — update before deploying to production."
          else
            echo "✓ BSCODE_ALLOWED_ORIGIN does not contain localhost"
          fi

      # ── Cloudflare deploy (only on push to main; gated on secrets) ────────────
      - name: Deploy worker to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping worker deploy: Cloudflare secrets not configured."
            exit 0
          fi
          bun run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy web to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping web deploy: Cloudflare secrets not configured."
            exit 0
          fi
          bun run deploy:web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_WORKER_URL: ${{ vars.BSCODE_WORKER_URL || 'https://bscode-worker.example.com' }}

  # Nightly: verify bscode installs cleanly from published npm packages
  # and that no workspace:* leaked into the published tarballs.
  nightly-npm-install:
    name: Nightly (npm published packages)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'

    steps:
      - name: Checkout bscode
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install from npm only (no local wasmagent-js)
        run: bun install --frozen-lockfile

      - name: Typecheck (worker)
        working-directory: apps/worker
        run: bunx tsc --noEmit
