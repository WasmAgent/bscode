name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bscode
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # @wasmagent/* 1.0.0 published to npm — no sibling checkout needed.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (worker)
        working-directory: apps/worker
        run: bunx tsc --noEmit

      - name: Typecheck (web)
        working-directory: apps/web
        run: bunx tsc --noEmit

      - name: Test (worker)
        working-directory: apps/worker
        run: bun run test

      - name: Test (web)
        working-directory: apps/web
        run: bun run test

      - name: Build (web)
        working-directory: apps/web
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # ── Cloudflare deploy (only on push to main; gated on secrets) ────────────
      - name: Deploy worker to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping worker deploy: Cloudflare secrets not configured."
            exit 0
          fi
          bun run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy web to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping web deploy: Cloudflare secrets not configured."
            exit 0
          fi
          bun run deploy:web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_WORKER_URL: ${{ vars.BSCODE_WORKER_URL || 'https://bscode-worker.byteslim.com' }}

  # Nightly: verify bscode installs cleanly from published npm packages
  # and that no workspace:* leaked into the published tarballs.
  nightly-npm-install:
    name: Nightly (npm published packages)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout bscode
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install from npm only (no local wasmagent-js)
        run: bun install --frozen-lockfile

      - name: Typecheck (worker)
        working-directory: apps/worker
        run: bunx tsc --noEmit
