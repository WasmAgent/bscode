name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      # Checkout agentkit-js FIRST into a sibling directory.
      # GitHub Actions doesn't allow checking out outside the workspace,
      # so we use a relative path within the workspace and create a
      # symlink the workspace expects (../agentkit-js).
      - name: Checkout agentkit-js
        uses: actions/checkout@v4
        with:
          repository: telleroutlook/agentkit-js
          path: agentkit-js
          ref: main

      - name: Checkout bscode
        uses: actions/checkout@v4
        with:
          path: bscode

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Make agentkit-js available as a sibling of bscode
        run: |
          # bscode/package.json references "../agentkit-js/packages/*" in workspaces.
          # GitHub puts both checkouts at $GITHUB_WORKSPACE (sibling already).
          ls -la "$GITHUB_WORKSPACE"
          echo "--- agentkit-js packages ---"
          ls -la "$GITHUB_WORKSPACE/agentkit-js/packages" || echo "MISSING"

      - name: Install dependencies (agentkit-js — build deps first)
        working-directory: agentkit-js
        run: bun install --frozen-lockfile

      - name: Build agentkit-js packages (so dist/ exists for typecheck)
        working-directory: agentkit-js
        run: bun run build

      - name: Install dependencies (bscode)
        working-directory: bscode
        run: bun install

      - name: Typecheck (worker)
        working-directory: bscode/apps/worker
        run: bunx tsc --noEmit

      - name: Typecheck (web)
        working-directory: bscode/apps/web
        run: bunx tsc --noEmit

      - name: Test (web)
        working-directory: bscode/apps/web
        run: bun run vitest run

      - name: Test (worker — if vitest config exists)
        working-directory: bscode/apps/worker
        run: |
          if [ -f vitest.config.ts ]; then bun run vitest run; else echo "no vitest config — skipping"; fi

      - name: Build (web)
        working-directory: bscode/apps/web
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
