name = "bscode-worker"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]


# ============================================================================
# Local development works with NO bindings — bscode falls back to in-memory.
# For a real Cloudflare deploy, uncomment the [[kv_namespaces]] blocks below
# and run the matching `wrangler kv namespace create` commands first.
# Full walk-through: ../../README.md#deploy-to-cloudflare
# ============================================================================

[vars]
AGENTKIT_LOG_LEVEL = "info"
# Set this to the actual deployment origin in production — "*" is unsafe for a deployed worker with auth.
BSCODE_ALLOWED_ORIGIN = "http://localhost:5173"
# P0-5: Auth is strict by default. When STRICT_AUTH=true, setting
# allowLocalSessionFallback=true at the same time causes a fatal startup error.
# Remove or set to "false" only for intentional local dev/test deployments.
STRICT_AUTH = "true"

# ── API keys (set via `wrangler secret put <NAME>`, never in [vars]) ──────────
#
# Anthropic (Claude):
#   wrangler secret put ANTHROPIC_API_KEY
#
# Volcengine Ark (Doubao / 火山引擎):
#   wrangler secret put DOUBAO_API_KEY
# Optional endpoint override (non-sensitive, can go in [vars]):
# DOUBAO_BASE_URL = "https://ark.cn-beijing.volces.com/api/v3"
#
# DeepSeek:
#   wrangler secret put DEEPSEEK_API_KEY
# Optional endpoint override:
# DEEPSEEK_BASE_URL = "https://api.deepseek.com/v1"
#
# GLM / GLM Coding Plan (智谱):
#   wrangler secret put GLM_API_KEY
# Choose ONE base URL (comment/uncomment as needed):
#   Standard GLM:      GLM_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"
#   Coding Plan:       GLM_BASE_URL = "https://open.bigmodel.cn/api/coding/paas/v4"
#   Anthropic protocol: GLM_BASE_URL = "https://open.bigmodel.cn/api/anthropic"
# GLM_BASE_URL = "https://open.bigmodel.cn/api/coding/paas/v4"
#
# Auth token (required for all deployments):
#   wrangler secret put BSCODE_CLIENT_TOKEN

# Optional embedding endpoint — swaps the default TF-IDF embedder for a real
# vector one. Works with OpenAI, TEI, Ollama, vLLM, anything OpenAI-shaped.
# Falls back to TF-IDF when missing.
#   wrangler secret put EMBEDDING_API_KEY
# EMBEDDING_BASE_URL = "https://api.openai.com"
# EMBEDDING_MODEL    = "text-embedding-3-small"

# --- KV namespaces (uncomment + paste IDs from `wrangler kv namespace create`) ---

# Virtual file system the coding assistant edits.
#   wrangler kv namespace create BSCODE_FILES
# [[kv_namespaces]]
# binding = "BSCODE_FILES"
# id = "YOUR_KV_ID_HERE"

# Session/prompt-cache result caching (warm replays across cold starts).
# Job records are mirrored here for cross-recycle persistence (durableKv).
#   wrangler kv namespace create BSCODE_SESSIONS
# [[kv_namespaces]]
# binding = "BSCODE_SESSIONS"
# id = "YOUR_KV_ID_HERE"

# B1 — durable agent checkpoints. Without this, paused runs do not survive
# worker recycle.
#   wrangler kv namespace create BSCODE_CHECKPOINTS
# [[kv_namespaces]]
# binding = "BSCODE_CHECKPOINTS"
# id = "YOUR_KV_ID_HERE"

# B2 — browser-reported install/build/test outcomes. Without this the
# snapshot is in-memory only (fine for single-recycle conversations).
#   wrangler kv namespace create BSCODE_BUILD_RESULTS
# [[kv_namespaces]]
# binding = "BSCODE_BUILD_RESULTS"
# id = "YOUR_KV_ID_HERE"

# P0-4 — Dedicated read-only KV for the public /mcp endpoint.
# ONLY bind this when you also set DANGEROUSLY_EXPOSE_DEPLOYMENT_KV=true in [vars].
# This MUST be a SEPARATE namespace from BSCODE_FILES — never share them.
# Without this binding, /mcp returns 503 when public MCP is enabled.
#   wrangler kv namespace create BSCODE_PUBLIC_READ_KV
# [[kv_namespaces]]
# binding = "BSCODE_PUBLIC_READ_KV"
# id = "YOUR_PUBLIC_KV_ID_HERE"

[dev]
port = 8787
local_protocol = "http"
